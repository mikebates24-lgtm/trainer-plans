<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hip Recovery Exercise Guide</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f7f7f7;
            color: #333;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .section {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .placeholder {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: #666;
        }
    </style>
</head>

<body>

    <h1>Hip Recovery Exercise Guide</h1>

    <div class="section">
        <div id="selection-area">

    <h2>Select Age Group</h2>
    <div class="button-row">
        <button class="select-btn" data-age="under60">Under 60</button>
        <button class="select-btn" data-age="60to75">60–75</button>
        <button class="select-btn" data-age="over75">75+</button>
    </div>

    <h2>Select Weight Category</h2>
    <div class="button-row">
        <button class="select-btn" data-weight="light">Light–Moderate</button>
        <button class="select-btn" data-weight="average">Average</button>
        <button class="select-btn" data-weight="higher">Higher Weight</button>
    </div>

    <div style="text-align:center; margin-top:30px;">
        <button id="continue-btn" class="continue-btn" disabled>Continue</button>
    </div>

</div>

<div id="output-area" style="display:none;">

    <div id="stage-selection" style="display:none;">
        <h2>Select Recovery Stage</h2>

        <div class="button-row">
            <button class="stage-btn" data-stage="weeks1to2">Weeks 1–2</button>
            <button class="stage-btn" data-stage="weeks3to6">Weeks 3–6</button>
            <button class="stage-btn" data-stage="weeks7to12">Weeks 7–12</button>
        </div>
    </div>

    <div id="exercise-output" style="display:none;"></div>

</div>
