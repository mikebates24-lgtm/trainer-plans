<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hip Recovery Tool</title>

<style>
    :root {
        --bg: #111;
        --card: #1a1a1a;
        --text: #eaeaea;
        --accent: #3fe0c5;
        --accent-soft: rgba(63, 224, 197, 0.2);
        --border: #333;
        --danger: #ff6b6b;
    }

    body {
        font-family: Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 20px;
        line-height: 1.6;
    }

    h1 {
        text-align: center;
        margin-bottom: 25px;
        color: var(--accent);
    }

    .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 15px;
        margin-bottom: 15px;
        box-shadow: 0 0 10px rgba(0,0,0,0.4);
    }

    .section-header {
        font-size: 1.2rem;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: var(--accent);
    }

    .section-header span {
        font-size: 1.5rem;
        transition: transform 0.3s ease;
    }

    .content {
        display: none;
        margin-top: 10px;
    }

    .exercise {
        margin-bottom: 10px;
        padding: 8px;
        background: var(--accent-soft);
        border-left: 3px solid var(--accent);
        border-radius: 5px;
    }

    .profile-inputs input,
    .profile-inputs select {
        width: 100%;
        padding: 8px;
        margin: 6px 0 12px 0;
        border-radius: 5px;
        border: 1px solid var(--border);
        background: #222;
        color: var(--text);
    }

    .btn {
        width: 100%;
        padding: 10px;
        background: var(--accent);
        border: none;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
        color: #000;
    }

    .btn-reset {
        width: 100%;
        padding: 10px;
        background: var(--danger);
        border: none;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
        color: #000;
    }

    .recommendation {
        padding: 10px;
        background: var(--accent-soft);
        border-left: 4px solid var(--accent);
        border-radius: 5px;
        margin-bottom: 10px;
    }

    .today-plan {
        padding: 12px;
        background: rgba(255,255,255,0.05);
        border-left: 4px solid var(--accent);
        border-radius: 5px;
        margin-top: 10px;
    }

    .checkbox {
        margin-right: 10px;
    }
</style>
</head>

<body>

<h1>Hip Recovery Tool</h1>

<!-- USER PROFILE -->
<div class="card">
    <h2 style="color: var(--accent)">Your Profile</h2>
    <div class="profile-inputs">

        <label>Age</label>
        <input type="number" id="age" placeholder="Enter your age">

        <label>Weight (kg)</label>
        <input type="number" id="weight" placeholder="Enter your weight">

        <label>Pain Level (0–10)</label>
        <input type="range" id="pain" min="0" max="10" value="2">

        <label>Select Your Phase</label>
        <select id="phase" onchange="updateWeekBlocks()">
            <option value="">Select...</option>
            <option value="1-2">Weeks 1–2</option>
            <option value="3-4">Weeks 3–4</option>
            <option value="5-6">Weeks 5–6</option>
            <option value="7-8">Weeks 7–8</option>
        </select>

        <button class="btn" onclick="generateRecommendations()">Update Recommendations</button>
        <button class="btn-reset" onclick="resetAll()">Reset</button>
    </div>
</div>

<!-- RECOMMENDATIONS -->
<div class="card">
    <div class="section-header" onclick="toggleSection(this)">
        Personalised Recommendations
        <span>+</span>
    </div>
    <div class="content" id="recommendations"></div>
</div>

<!-- TODAY'S PLAN -->
<div class="card">
    <div class="section-header" onclick="toggleSection(this)">
        Today’s Plan Summary
        <span>+</span>
    </div>
    <div class="content" id="todayPlan"></div>
</div>

<!-- MOBILITY -->
<div class="card">
    <div class="section-header" onclick="toggleSection(this)">
        Mobility & Warm‑Up
        <span>+</span>
    </div>
    <div class="content" id="mobility"></div>
</div>

<!-- STRENGTH -->
<div class="card">
    <div class="section-header" onclick="toggleSection(this)">
        Strength & Stability
        <span>+</span>
    </div>
    <div class="content" id="strength"></div>
</div>

<!-- STRETCHING -->
<div class="card">
    <div class="section-header" onclick="toggleSection(this)">
        Stretching & Cool‑Down
        <span>+</span>
    </div>
    <div class="content" id="stretching"></div>
</div>

<script>
function toggleSection(header) {
    const content = header.nextElementSibling;
    const icon = header.querySelector("span");

    if (content.style.display === "block") {
        content.style.display = "none";
        icon.textContent = "+";
    } else {
        content.style.display = "block";
        icon.textContent = "×";
    }
}

function updateWeekBlocks() {
    const phase = document.getElementById("phase").value;

    const mobility = document.getElementById("mobility");
    const strength = document.getElementById("strength");
    const stretching = document.getElementById("stretching");

    mobility.innerHTML = "";
    strength.innerHTML = "";
    stretching.innerHTML = "";

    if (!phase) return;

    const blocks = {
        "1-2": {
            mobility: [
                "Pelvic Tilts — 10–12 reps",
                "Cat‑Cow — 8–10 reps",
                "Hip Circles — 8 each direction",
                "Glute Activation — 10 reps"
            ],
            strength: [
                "Bridge Holds — 15–20 sec",
                "Side‑lying Leg Raises — 10–12 each",
                "Clamshells — 10–12 each"
            ],
            stretching: [
                "Hip Flexor Stretch — 20 sec",
                "Piriformis Stretch — 20 sec",
                "Hamstring Stretch — 20 sec"
            ]
        },
        "3-4": {
            mobility: [
                "Pelvic Tilts — 12–15 reps",
                "Cat‑Cow — 10 reps",
                "Hip CARs — 5 each direction",
                "Glute Activation — 12 reps"
            ],
            strength: [
                "Bridge Holds — 20–25 sec",
                "Side‑lying Leg Raises — 12–15 each",
                "Clamshells — 12–15 each",
                "Mini Squats — 10 reps"
            ],
            stretching: [
                "Hip Flexor Stretch — 25 sec",
                "Piriformis Stretch — 25 sec",
                "Hamstring Stretch — 25 sec"
            ]
        },
        "5-6": {
            mobility: [
                "Pelvic Tilts — 15 reps",
                "Cat‑Cow — 12 reps",
                "Hip CARs — 6 each direction",
                "Standing Hip Flexor Mobility — 8 reps"
            ],
            strength: [
                "Bridge Holds — 25–30 sec",
                "Side‑lying Leg Raises — 15 each",
                "Clamshells — 15 each",
                "Mini Squats — 12 reps",
                "Single‑leg Balance — 20 sec each"
            ],
            stretching: [
                "Hip Flexor Stretch — 30 sec",
                "Piriformis Stretch — 30 sec",
                "Hamstring Stretch — 30 sec"
            ]
        },
        "7-8": {
            mobility: [
                "Pelvic Tilts — 15–20 reps",
                "Cat‑Cow — 12–15 reps",
                "Hip CARs — 8 each direction",
                "End‑range Hip Flexor Mobility — 8 reps"
            ],
            strength: [
                "Bridge Holds — 30 sec",
                "Side‑lying Leg Raises — 15–18 each",
                "Clamshells — 15–18 each",
                "Mini Squats — 15 reps",
                "Single‑leg Balance — 25 sec each"
            ],
            stretching: [
                "Hip Flexor Stretch — 30–35 sec",
                "Piriformis Stretch — 30–35 sec",
                "Hamstring Stretch — 30–35 sec"
            ]
        }
    };

    blocks[phase].mobility.forEach(ex => {
        mobility.innerHTML += `<div class="exercise"><input class="checkbox" type="checkbox">${ex}</div>`;
    });

    blocks[phase].strength.forEach(ex => {
        strength.innerHTML += `<div class="exercise"><input class="checkbox" type="checkbox">${ex}</div>`;
    });

    blocks[phase].stretching.forEach(ex => {
        stretching.innerHTML += `<div class="exercise"><input class="checkbox" type="checkbox">${ex}</div>`;
    });
}

function generateRecommendations() {
    const age = Number(document.getElementById("age").value);
    const weight = Number(document.getElementById("weight").value);
    const pain = Number(document.getElementById("pain").value);
    const phase = document.getElementById("phase").value;

    let rec = "";
    let plan = "";

    if (!age || !weight || !phase) {
        rec = "<div class='recommendation'>Please enter age, weight, and select a phase.</div>";
        document.getElementById("recommendations").innerHTML = rec;
        document.getElementById("todayPlan").innerHTML = "";
        return;
    }

    // AGE LOGIC
    if (age < 60) {
        rec += "<div class='recommendation'>Age group: Under 60 — standard baseline, full routine unless pain dictates otherwise.</div>";
    } else if (age <= 75) {
        rec += "<div class='recommendation'>Age group: 60–75 — avoid end‑range loading, use controlled tempo.</div>";
    } else {
        rec += "<div class='recommendation'>Age group: 75+ — reduce reps/holds, prioritise balance and stability.</div>";
    }

    // WEIGHT LOGIC
    if (weight < 70) {
        rec += "<div class='recommendation'>Weight category: Under 70 kg — standard movement selection.</div>";
    } else if (weight <= 95) {
        rec += "<div class='recommendation'>Weight category: 70–95 kg — slight caution with deep squats or single‑leg loading.</div>";
    } else {
        rec += "<div class='recommendation'>Weight category: 95+ kg — avoid deep squats; prioritise glute activation and reduced‑range strength.</div>";
    }

    // PAIN LOGIC
    if (pain >= 6) {
        rec += "<div class='recommendation'>High pain — avoid strength work today; focus on mobility and gentle stretching.</div>";
    } else if (pain >= 3) {
        rec += "<div class='recommendation'>Moderate pain — reduce intensity and avoid end‑range positions.</div>";
    } else {
        rec += "<div class='recommendation'>Low pain — full routine recommended.</div>";
    }

    // TODAY'S PLAN SUMMARY
    const phaseText = {
        "1-2": "Foundation phase — gentle mobility and basic activation.",
        "3-4": "Stability phase — controlled tempo and moderate reps.",
        "5-6": "Strength integration — moderate reps and added variations.",
        "7-8": "Advanced control — full routine unless pain dictates otherwise."
    };

    plan += `<div class='today-plan'><strong>Today’s Plan:</strong><br>
    You are in <strong>Weeks ${phase}</strong> — ${phaseText[phase]}<br><br>
    Based on your profile (Age ${age}, ${weight} kg, Pain ${pain}), focus on `;

    if (pain >= 6) {
        plan += "gentle mobility and stretching only. Avoid all loaded movements.";
    } else if (pain >= 3) {
        plan += "moderate‑intensity mobility, reduced‑range strength work, and avoid deep flexion.";
    } else {
        plan += "full mobility, strength, and stretching routine with normal progression.";
    }

    plan += "</div>";

    document.getElementById("recommendations").innerHTML = rec;
    document.getElementById("todayPlan").innerHTML = plan;
}

function resetAll() {
    document.getElementById("age").value = "";
    document.getElementById("weight").value = "";
    document.getElementById("pain").value = 2;
    document.getElementById("phase").value = "";

    document.getElementById("recommendations").innerHTML = "";
    document.getElementById("todayPlan").innerHTML = "";

    document.getElementById("mobility").innerHTML = "";
    document.getElementById("strength").innerHTML = "";
    document.getElementById("stretching").innerHTML = "";

    document.querySelectorAll(".checkbox").forEach(cb => cb.checked = false);

    localStorage.clear();

    document.querySelectorAll(".content").forEach(c => c.style.display = "none");
}
</script>

</body>
</html>
