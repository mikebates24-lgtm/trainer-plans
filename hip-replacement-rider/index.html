<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ============================
         GLOBAL STYLESHEET
         ============================ -->
    <style>
       /* ============================
   GLOBAL VARIABLES + AUTO THEME
   ============================ */

:root {
    --accent: #4fc3f7;

    --bg: #ffffff;
    --bg-panel: #f4f6f8;
    --bg-card: #ffffff;

    --text: #222222;
    --text-muted: #666666;

    --border: #d0d7de;
    --shadow: rgba(0, 0, 0, 0.06);

    --radius: 10px;
    --transition: 0.25s ease;
    --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
}

/* Dark mode */
@media (prefers-color-scheme: dark) {
    :root {
        --bg: #0f1115;
        --bg-panel: #1a1d23;
        --bg-card: #1e2128;

        --text: #e6e6e6;
        --text-muted: #9aa0a6;

        --border: #2a2f36;
        --shadow: rgba(0, 0, 0, 0.4);
    }
}

/* ============================
   GLOBAL RESET + BASE
   ============================ */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    line-height: 1.5;
    padding: 0;
    margin: 0;
}

/* ============================
   LAYOUT: SIDEBAR + MAIN
   ============================ */

.app {
    display: flex;
    min-height: 100vh;
}

.sidebar {
    width: 260px;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    padding: 20px;
}

.main {
    flex: 1;
    padding: 24px;
}

/* ============================
   WORKOUT CARDS
   ============================ */

.workout-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 4px var(--shadow);
    transition: var(--transition);
}

.workout-card:hover {
    border-color: var(--accent);
}

/* ============================
   BUTTONS
   ============================ */

button,
.btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 12px 18px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 1rem;
    transition: var(--transition);
}

button:hover,
.btn:hover {
    opacity: 0.9;
}

/* ============================
   SETUP PANEL
   ============================ */

.setup-panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
}

/* ============================
   ACCORDION PANELS
   ============================ */

.panel-toggle {
    cursor: pointer;
    padding: 12px;
    background: var(--bg-panel);
    border-radius: var(--radius);
    margin-bottom: 8px;
    border: 1px solid var(--border);
}

.panel-content {
    display: none;
    padding: 12px;
    border-left: 3px solid var(--accent);
    margin-bottom: 16px;
}

/* ============================
   MYWHOOSH LINK
   ============================ */

.whoosh-link {
    display: inline-block;
    padding: 10px 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    color: var(--text-muted);
    text-decoration: none;
    transition: var(--transition);
}

.whoosh-link:hover {
    border-color: var(--accent);
    color: var(--accent);
}

/* ============================
   CHART CONTAINER
   ============================ */

.chart-container {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-top: 20px;
}

/* ============================
   COMPLETION BUTTON
   ============================ */

.complete-btn {
    background: var(--accent);
    color: #fff;
    padding: 14px;
    border-radius: var(--radius);
    text-align: center;
    cursor: pointer;
    margin-top: 20px;
}

/* ============================
   RESPONSIVE BREAKPOINTS
   ============================ */

@media (max-width: 900px) {
    .app {
        flex-direction: column;
    }

    .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
    }
}

@media (max-width: 600px) {
    .main {
        padding: 16px;
    }

    .workout-card {
        padding: 16px;
    }
}

/* ============================
   FOLDABLE INNER-DISPLAY OPTIMISATION
   ============================ */

@media (max-width: 700px) and (orientation: portrait) {
    .sidebar {
        padding: 16px;
    }

    .main {
        padding: 16px;
    }

    .workout-card {
        padding: 18px;
    }
}

    </style>
</head>

<body>

  <!-- ============================
     APP WRAPPER
     ============================ -->
<div class="app">

    <!-- ============================
         SIDEBAR
         ============================ -->
    <aside class="sidebar">

        <h2>Setup</h2>

        <div class="setup-panel">
            <label>Age</label>
            <input id="age" type="number" min="10" max="90">

            <label>Experience</label>
            <select id="experience">
                <option value="beginner">Beginner</option>
                <option value="intermediate">Intermediate</option>
                <option value="advanced">Advanced</option>
            </select>

            <label>Pain Level</label>
            <select id="pain">
                <option value="none">None</option>
                <option value="mild">Mild</option>
                <option value="moderate">Moderate</option>
                <option value="severe">Severe</option>
            </select>

            <label>Weeks</label>
            <input id="weeks" type="number" min="1" max="20">

            <label>Yesterday’s Workout</label>
            <select id="yesterday">
                <option value="none">None</option>
                <option value="easy">Easy</option>
                <option value="moderate">Moderate</option>
                <option value="hard">Hard</option>
            </select>

            <label>Equipment</label>
            <div>
                <input id="eq-indoor" type="checkbox"> Indoor trainer<br>
                <input id="eq-outdoor" type="checkbox"> Outdoor bike<br>
                <input id="eq-bands" type="checkbox"> Resistance bands
            </div>

            <button id="apply-settings">Apply Settings</button>
        </div>

        <h2>Summary</h2>
        <div id="setup-summary" class="setup-panel">
            <!-- Filled dynamically -->
        </div>

    </aside>

    <!-- ============================
         MAIN CONTENT
         ============================ -->
    <main class="main">

        <!-- ============================
             TODAY’S RECOMMENDATION
             ============================ -->
        <section id="today-section">
            <h2>Today’s Recommendation</h2>
            <div id="today-card" class="workout-card">
                <!-- Filled dynamically -->
            </div>
        </section>

        <!-- ============================
             WEEKLY PLAN
             ============================ -->
        <section id="week-section">
            <h2>This Week</h2>
            <div id="week-cards">
                <!-- Cards inserted dynamically -->
            </div>
        </section>

        <!-- ============================
             ACCORDION PANELS
             ============================ -->
        <section id="accordion-section">

            <div class="panel-toggle">Equipment Notes</div>
            <div class="panel-content" id="panel-equipment">
                <!-- Filled dynamically -->
            </div>

            <div class="panel-toggle">Training Notes</div>
            <div class="panel-content" id="panel-training">
                <!-- Filled dynamically -->
            </div>

            <div class="panel-toggle">MyWhoosh Workouts</div>
            <div class="panel-content" id="panel-whoosh">
                <a class="whoosh-link" href="https://www.mywhoosh.com" target="_blank">
                    Open MyWhoosh
                </a>
            </div>

        </section>

        <!-- ============================
             CHART
             ============================ -->
        <section class="chart-container">
            <h2>Training Load</h2>
            <canvas id="load-chart"></canvas>
        </section>

        <!-- ============================
             COMPLETION BUTTON
             ============================ -->
        <div class="complete-btn" id="complete-btn">
            Mark Today as Completed
        </div>

    </main>

</div>


    <!-- ============================
         APPLICATION SCRIPT
         ============================ -->
    <script>
       /* ============================
   J1 — DOM HELPERS + GLOBAL STATE
   ============================ */

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

const state = {
    age: null,
    experience: null,
    pain: null,
    weeks: null,
    yesterday: null,
    equipment: {
        indoor: false,
        outdoor: false,
        bands: false
    },
    completed: false
};

/* ============================
   J2 — APPLY SETTINGS + SUMMARY
   ============================ */

function applySettings() {
    state.age = $("#age").value;
    state.experience = $("#experience").value;
    state.pain = $("#pain").value;
    state.weeks = $("#weeks").value;
    state.yesterday = $("#yesterday").value;

    state.equipment.indoor = $("#eq-indoor").checked;
    state.equipment.outdoor = $("#eq-outdoor").checked;
    state.equipment.bands = $("#eq-bands").checked;

    updateSummary();
    updateToday();
    updateWeek();
    updateEquipmentNotes();
    updateTrainingNotes();
}

function updateSummary() {
    $("#setup-summary").innerHTML = `
        <strong>Age:</strong> ${state.age || "-"}<br>
        <strong>Experience:</strong> ${state.experience}<br>
        <strong>Pain:</strong> ${state.pain}<br>
        <strong>Weeks:</strong> ${state.weeks || "-"}<br>
        <strong>Yesterday:</strong> ${state.yesterday}<br>
        <strong>Equipment:</strong>
        ${[
            state.equipment.indoor ? "Indoor trainer" : null,
            state.equipment.outdoor ? "Outdoor bike" : null,
            state.equipment.bands ? "Bands" : null
        ].filter(Boolean).join(", ") || "None"}
    `;
}

/* ============================
   J3 — TODAY’S RECOMMENDATION
   ============================ */

function updateToday() {
    const card = $("#today-card");

    let recommendation = "Easy Zone 2 ride";
    let duration = "45–60 minutes";

    if (state.pain === "moderate") {
        recommendation = "Recovery spin";
        duration = "20–30 minutes";
    }

    if (state.pain === "severe") {
        recommendation = "Rest day";
        duration = "Full rest";
    }

    if (state.yesterday === "hard") {
        recommendation = "Recovery spin";
        duration = "20–30 minutes";
    }

    card.innerHTML = `
        <h3>${recommendation}</h3>
        <p>Duration: ${duration}</p>
    `;
}

/* ============================
   J4 — WEEKLY PLAN
   ============================ */

function updateWeek() {
    const container = $("#week-cards");
    container.innerHTML = "";

    const days = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

    days.forEach((day) => {
        const div = document.createElement("div");
        div.className = "workout-card";
        div.innerHTML = `
            <strong>${day}</strong><br>
            <span>Workout: TBD</span>
        `;
        container.appendChild(div);
    });
}

/* ============================
   J5 — EQUIPMENT + TRAINING NOTES
   ============================ */

function updateEquipmentNotes() {
    const el = $("#panel-equipment");

    const notes = [];

    if (state.equipment.indoor) notes.push("Indoor trainer available.");
    if (state.equipment.outdoor) notes.push("Outdoor bike available.");
    if (state.equipment.bands) notes.push("Resistance bands available.");

    el.innerHTML = notes.length ? notes.join("<br>") : "No equipment selected.";
}

function updateTrainingNotes() {
    const el = $("#panel-training");

    const notes = [];

    if (state.experience === "beginner") {
        notes.push("Focus on consistency and low intensity.");
    }
    if (state.experience === "advanced") {
        notes.push("Include threshold and VO2 intervals weekly.");
    }
    if (state.pain !== "none") {
        notes.push("Reduce intensity until pain improves.");
    }

    el.innerHTML = notes.length ? notes.join("<br>") : "No specific notes.";
}

/* ============================
   J6 — ACCORDION PANELS
   ============================ */

const panelToggles = $$(".panel-toggle");
const panels = $$(".panel-content");

panelToggles.forEach((toggle, i) => {
    toggle.addEventListener("click", () => {
        const panel = panels[i];
        panel.style.display = panel.style.display === "block" ? "none" : "block";
    });
});

/* ============================
   J7 — COMPLETION BUTTON
   ============================ */

$("#complete-btn").addEventListener("click", () => {
    state.completed = true;
    $("#complete-btn").innerText = "Completed ✔";
});

/* ============================
   J8 — CHART (STATIC DEMO)
   ============================ */

function drawChart() {
    const canvas = $("#load-chart");
    const ctx = canvas.getContext("2d");

    canvas.width = canvas.clientWidth;
    canvas.height = 200;

    ctx.fillStyle = "#4fc3f7";
    ctx.fillRect(10, 50, 40, 120);
    ctx.fillRect(70, 30, 40, 140);
    ctx.fillRect(130, 80, 40, 90);
    ctx.fillRect(190, 60, 40, 110);
}

window.addEventListener("resize", drawChart);

/* ============================
   J9 — INITIALISE
   ============================ */

$("#apply-settings").addEventListener("click", applySettings);

drawChart();

    </script>

</body>
</html>
