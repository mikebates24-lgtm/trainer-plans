<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hip Recovery Exercise Guide</title>  
</head>
    <style>
/* ------------------------------ GENERAL LAYOUT & TYPOGRAPHY --------------------------------*/
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background: #f7f7f7;
    color: #333;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

.section {
    max-width: 700px;
    margin: 0 auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.placeholder {
    text-align: center;
    padding: 40px;
    font-size: 1.2rem;
    color: #666;
}

/* ------------------------------ STAGE BUTTONS --------------------------------*/
.stage-selector {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

.stage-btn {
    flex: 1;
    margin: 0 5px;
    padding: 12px;
    background: #e0e0e0;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    transition: background 0.3s, transform 0.2s;
}

.stage-btn:hover {
    background: #d5d5d5;
}

.stage-btn.active {
    background: #4CAF50;
    color: white;
    transform: scale(1.03);
}

/* ------------------------------ EXERCISE CARDS --------------------------------*/
.exercise-card {
    background: #fafafa;
    border-radius: 8px;
    padding: 15px;
    margin-bottom: 12px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.08);
    cursor: pointer;
    transition: transform 0.2s;
}

.exercise-card:hover {
    transform: scale(1.01);
}

.exercise-header {
    font-size: 1.1rem;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 10px;
}

.exercise-content {
    display: none;
    margin-top: 10px;
    padding-left: 5px;
    color: #555;
}

/* ------------------------------ ANIMATIONS --------------------------------*/
@keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
}

@keyframes slideDown {
    from { transform: translateY(-5px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
}

.slide-down {
    animation: slideDown 0.3s ease;
}

/* ------------------------------ ICON ANIMATIONS --------------------------------*/
.icon-bounce {
    animation: iconBounce 0.35s ease;
}

@keyframes iconBounce {
    0%   { transform: translateY(0); }
    30%  { transform: translateY(-4px); }
    60%  { transform: translateY(2px); }
    100% { transform: translateY(0); }
}

.icon-pulse {
    animation: iconPulse 0.4s ease;
}

@keyframes iconPulse {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.15); }
    100% { transform: scale(1); }
}

@media (hover: hover) {
    .exercise-header:hover {
        animation: iconWiggle 0.25s ease;
    }

    @keyframes iconWiggle {
        0%   { transform: rotate(0deg); }
        25%  { transform: rotate(2deg); }
        75%  { transform: rotate(-2deg); }
        100% { transform: rotate(0deg); }
    }
}

/* ------------------------------ RESTART BUTTON --------------------------------*/
#restart-btn {
    display: block;
    margin: 25px auto 0;
    padding: 12px 20px;
    background: #ff5252;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    transition: background 0.3s, transform 0.2s;
}

#restart-btn:hover {
    background: #e04848;
    transform: scale(1.03);
}

/* ------------------------------ RESPONSIVE --------------------------------*/
@media (max-width: 600px) {
    .stage-selector {
        flex-direction: column;
    }

    .stage-btn {
        margin: 5px 0;
    }
}
</style>
</head>

<body>

    <h1>Hip Recovery Exercise Guide</h1>

    <div class="section">
        <div class="stage-selector">
            <button class="stage-btn" onclick="selectStage(1)">Stage 1</button>
            <button class="stage-btn" onclick="selectStage(2)">Stage 2</button>
            <button class="stage-btn" onclick="selectStage(3)">Stage 3</button>
        </div>

        <div id="output-area" style="display:none;"></div>

        <button id="restart-btn" onclick="restart()">Restart</button>
    </div>

    <script>
        function selectStage(stage) {
            document.getElementById("output-area").style.display = "block";
            document.getElementById("output-area").innerHTML =
                "<div class='exercise-card'><div class='exercise-header'>Exercise for Stage " + stage + "</div><div class='exercise-content'>Details for Stage " + stage + "</div></div>";
        }

        function restart() {
            document.getElementById("output-area").style.display = "none";
        }
    </script>

</body>
</html>
