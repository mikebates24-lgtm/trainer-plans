<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hip‑Replacement Rider — Training Plan</title>

<style>
    body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #0d0f12;
        color: #e6e6e6;
        display: flex;
        height: 100vh;
        overflow: hidden;
    }

    .sidebar {
        width: 300px;
        background: #111418;
        border-right: 1px solid #1c1f24;
        padding: 30px 20px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
    }

    .sidebar h2 {
        font-size: 22px;
        margin-bottom: 25px;
        color: #4fc3f7;
        letter-spacing: 0.5px;
    }

    .sidebar .section-title {
        margin-top: 25px;
        margin-bottom: 10px;
        font-size: 14px;
        text-transform: uppercase;
        color: #7aa0b8;
        letter-spacing: 1px;
    }

    .sidebar button {
        background: #1a1d22;
        border: 1px solid #2a2f36;
        padding: 12px 14px;
        margin-bottom: 10px;
        border-radius: 8px;
        color: #d0d0d0;
        font-size: 15px;
        cursor: pointer;
        text-align: left;
        transition: 0.2s;
    }

    .sidebar button:hover {
        background: #22262d;
        border-color: #4fc3f7;
        color: #4fc3f7;
    }

    .main {
        flex: 1;
        overflow-y: auto;
        padding: 30px;
    }

    .main h1 {
        font-size: 28px;
        margin-bottom: 12px;
        color: #4fc3f7;
    }

    .tagline {
        font-size: 14px;
        color: #9ea7af;
        margin-bottom: 14px;
    }

    .setup-toggle,
    .weekly-toggle {
        background: #14171c;
        border-radius: 12px;
        padding: 12px 16px;
        border: 1px solid #1f242b;
        box-shadow: 0 0 14px rgba(79,195,247,0.35);
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        margin-bottom: 10px;
        transition: 0.2s;
    }

    .setup-toggle:hover,
    .weekly-toggle:hover {
        box-shadow: 0 0 18px rgba(79,195,247,0.55);
        border-color: #4fc3f7;
    }

    .setup-toggle span,
    .weekly-toggle span {
        font-size: 15px;
        color: #cfd8dc;
    }

    .chevron {
        font-size: 18px;
        color: #4fc3f7;
    }

    .setup-panel,
    .weekly-panel {
        background: #14171c;
        border-radius: 12px;
        border: 1px solid #1f242b;
        box-shadow: 0 0 18px rgba(79,195,247,0.45);
        padding: 18px 18px 16px;
        margin-bottom: 20px;
        display: none;
    }

    .setup-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px 20px;
        margin-bottom: 16px;
    }

    .setup-field label {
        display: block;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: #7aa0b8;
        margin-bottom: 6px;
    }

    .setup-field select {
        width: 100%;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid #2a2f36;
        background: #1a1d22;
        color: #e6e6e6;
        outline: none;
        font-size: 14px;
    }

    .setup-field select:focus {
        border-color: #4fc3f7;
    }

    .checkbox-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 14px;
        color: #c7c7c7;
    }

    .checkbox-group label {
        text-transform: none;
        letter-spacing: 0;
        font-size: 14px;
        color: #c7c7c7;
    }

    .setup-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
    }

    .setup-actions button {
        background: #4fc3f7;
        border: none;
        color: #0d0f12;
        padding: 10px 18px;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 0 14px rgba(79,195,247,0.6);
        transition: 0.2s;
    }

    .setup-actions button:hover {
        box-shadow: 0 0 18px rgba(79,195,247,0.9);
        transform: translateY(-1px);
    }

    .setup-summary {
        font-size: 13px;
        color: #9ea7af;
    }

    .setup-summary strong {
        color: #cfd8dc;
    }

    .weekly-strip {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 8px;
        font-size: 12px;
    }

    .day-cell {
        background: #1a1d22;
        border-radius: 8px;
        padding: 6px 8px;
        border: 1px solid #2a2f36;
        min-height: 54px;
    }

    .day-name {
        font-weight: 600;
        color: #cfd8dc;
        margin-bottom: 2px;
    }

    .day-content {
        color: #9ea7af;
        line-height: 1.3;
    }

    .day-fatigue-low { border-color: #4caf50; }
    .day-fatigue-mod { border-color: #ffb300; }
    .day-fatigue-high { border-color: #e53935; }

    .card {
        background: #14171c;
        border-radius: 14px;
        padding: 22px;
        margin-bottom: 22px;
        border: 1px solid #1f242b;
        box-shadow: 0 0 12px rgba(79,195,247,0.25);
        transition: 0.25s;
    }

    .card:hover {
        box-shadow: 0 0 18px rgba(79,195,247,0.45);
        border-color: #4fc3f7;
    }

    .card-header {
        display: flex;
        align-items: center;
        margin-bottom: 10px;
    }

    .badge {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: #4fc3f7;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-right: 14px;
        box-shadow: 0 0 10px rgba(79,195,247,0.6);
    }

    .badge svg {
        width: 24px;
        height: 24px;
        fill: #0d0f12;
    }

    .card-title {
        font-size: 20px;
        font-weight: 600;
    }

    .card p {
        margin: 6px 0;
        line-height: 1.5;
        color: #c7c7c7;
    }

    .primary {
        border: 1px solid #4fc3f7;
        box-shadow: 0 0 18px rgba(79,195,247,0.45);
    }

    .card-meta {
        font-size: 13px;
        color: #9ea7af;
        margin-top: 4px;
    }

    .fatigue-label {
        font-size: 13px;
        color: #cfd8dc;
        margin-top: 4px;
    }

    .coach-notes {
        font-size: 13px;
        color: #b0bec5;
        margin-top: 8px;
        border-top: 1px dashed #263238;
        padding-top: 8px;
    }

    .card-actions {
        margin-top: 10px;
    }

    .complete-btn {
        background: transparent;
        border-radius: 999px;
        border: 1px solid #4fc3f7;
        color: #4fc3f7;
        padding: 6px 12px;
        font-size: 13px;
        cursor: pointer;
        transition: 0.2s;
    }

    .complete-btn:hover {
        background: #4fc3f7;
        color: #0d0f12;
        box-shadow: 0 0 10px rgba(79,195,247,0.7);
    }

    .disclaimer {
        margin-top: 32px;
        font-size: 13px;
        color: #8a8a8a;
        line-height: 1.5;
        border-top: 1px solid #1f242b;
        padding-top: 18px;
    }
</style>
</head>

<body>

<div class="sidebar">
    <h2>Hip‑Replacement Rider</h2>

    <div class="section-title">Training Phases</div>
    <button onclick="loadPhase(1)">Phase 1 — Protection</button>
    <button onclick="loadPhase(2)">Phase 2 — Rebuild</button>
    <button onclick="loadPhase(3)">Phase 3 — Return to Cycling</button>

    <div class="section-title">Tools</div>
    <button onclick="loadToday()">Today's Recommendation</button>
    <button onclick="loadAll()">All Workouts</button>
</div>

<div class="main" id="main">
    <div id="setup-container">
        <div class="setup-toggle" onclick="toggleSetupPanel()">
            <span><strong>Recovery Setup</strong> — personalise today’s plan</span>
            <span class="chevron" id="setup-chevron">▸</span>
        </div>

        <div class="setup-panel" id="setup-panel">
            <div class="setup-grid">
                <div class="setup-field">
                    <label for="weekRange">Recovery timeline</label>
                    <select id="weekRange">
                        <option value="0-2">0–2 weeks</option>
                        <option value="2-4">2–4 weeks</option>
                        <option value="4-12" selected>4–12 weeks</option>
                        <option value="12+">12+ weeks</option>
                    </select>
                </div>

                <div class="setup-field">
                    <label for="experience">Cycling experience</label>
                    <select id="experience">
                        <option value="beginner">Beginner</option>
                        <option value="intermediate">Intermediate</option>
                        <option value="advanced" selected>Advanced</option>
                    </select>
                </div>

                <div class="setup-field">
                    <label for="painLevel">Pain level today</label>
                    <select id="painLevel">
                        <option value="none">None</option>
                        <option value="mild" selected>Mild</option>
                        <option value="moderate">Moderate</option>
                    </select>
                </div>

                <div class="setup-field">
                    <label>Equipment available</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" id="equipTrainer" checked> Indoor trainer</label>
                        <label><input type="checkbox" id="equipOutdoor" checked> Outdoor bike</label>
                        <label><input type="checkbox" id="equipBands"> Resistance bands</label>
                    </div>
                </div>

                <div class="setup-field">
                    <label for="yesterdayType">Yesterday’s workout</label>
                    <select id="yesterdayType">
                        <option value="auto">Auto‑detected (if available)</option>
                        <option value="none">Nothing</option>
                        <option value="mobility">Mobility / rehab only</option>
                        <option value="indoor-easy">Indoor easy endurance</option>
                        <option value="outdoor-easy">Outdoor easy spin</option>
                        <option value="strength">Strength / bands</option>
                        <option value="hard-ride">Hard ride (advanced only)</option>
                    </select>
                </div>
            </div>

            <div class="setup-actions">
