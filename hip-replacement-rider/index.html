<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hip‑Replacement Rider — Training App</title>

<style>
    body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #0d0f12;
        color: #e6e6e6;
        display: flex;
        height: 100vh;
        overflow: hidden;
    }

    /* --- SIDEBAR --- */
    .sidebar {
        width: 300px;
        background: #111418;
        border-right: 1px solid #1c1f24;
        padding: 30px 20px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
    }

    .sidebar h2 {
        font-size: 22px;
        margin-bottom: 25px;
        color: #4fc3f7;
        letter-spacing: 0.5px;
    }

    .sidebar .section-title {
        margin-top: 25px;
        margin-bottom: 10px;
        font-size: 14px;
        text-transform: uppercase;
        color: #7aa0b8;
        letter-spacing: 1px;
    }

    .sidebar button {
        background: #1a1d22;
        border: 1px solid #2a2f36;
        padding: 12px 14px;
        margin-bottom: 10px;
        border-radius: 8px;
        color: #d0d0d0;
        font-size: 15px;
        cursor: pointer;
        text-align: left;
        transition: 0.2s;
    }

    .sidebar button:hover {
        background: #22262d;
        border-color: #4fc3f7;
        color: #4fc3f7;
    }

    /* --- MAIN PANEL --- */
    .main {
        flex: 1;
        overflow-y: auto;
        padding: 30px;
    }

    .main h1 {
        font-size: 28px;
        margin-bottom: 20px;
        color: #4fc3f7;
    }

    /* --- WORKOUT CARD --- */
    .card {
        background: #14171c;
        border-radius: 14px;
        padding: 22px;
        margin-bottom: 25px;
        border: 1px solid #1f242b;
        box-shadow: 0 0 12px rgba(79,195,247,0.25);
        transition: 0.25s;
    }

    .card:hover {
        box-shadow: 0 0 18px rgba(79,195,247,0.45);
        border-color: #4fc3f7;
    }

    .card-header {
        display: flex;
        align-items: center;
        margin-bottom: 12px;
    }

    .badge {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: #4fc3f7;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-right: 14px;
        box-shadow: 0 0 10px rgba(79,195,247,0.6);
    }

    .badge svg {
        width: 24px;
        height: 24px;
        fill: #0d0f12;
    }

    .card-title {
        font-size: 20px;
        font-weight: 600;
    }

    .card p {
        margin: 8px 0;
        line-height: 1.5;
        color: #c7c7c7;
    }

    .primary {
        border: 1px solid #4fc3f7;
        box-shadow: 0 0 18px rgba(79,195,247,0.45);
    }

    /* --- DISCLAIMER --- */
    .disclaimer {
        margin-top: 40px;
        font-size: 13px;
        color: #8a8a8a;
        line-height: 1.5;
        border-top: 1px solid #1f242b;
        padding-top: 20px;
    }
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Hip‑Replacement Rider</h2>

    <div class="section-title">Training Phases</div>
    <button onclick="loadPhase(1)">Phase 1 — Protection</button>
    <button onclick="loadPhase(2)">Phase 2 — Rebuild</button>
    <button onclick="loadPhase(3)">Phase 3 — Return to Cycling</button>

    <div class="section-title">Tools</div>
    <button onclick="loadToday()">Today's Recommendation</button>
    <button onclick="loadAll()">All Workouts</button>
</div>

<!-- MAIN PANEL -->
<div class="main" id="main">
    <h1>Welcome</h1>
    <p>Select a phase or tool from the sidebar to begin.</p>
</div>

<script>
/* --- CYCLING BADGE ICON --- */
const badgeIcon = `
<div class="badge">
<svg viewBox="0 0 24 24">
<path d="M5 16a3 3 0 1 0 0 6 3 3 0 0 0 0-6zm14-9a2 2 0 1 0 0-4 2 2 0 0 0 0 4zM5 14l3-5h4l3 5m-6-5l2-4h4" />
</svg>
</div>`;

/* --- WORKOUT DATA --- */
const workouts = {
    phase1: [
        {
            title: "Gentle Mobility Routine",
            purpose: "Restore movement without loading the joint.",
            safety: "Stop immediately if you feel sharp pain."
        },
        {
            title: "Assisted Pedal Motion",
            purpose: "Neuromuscular activation with zero resistance.",
            safety: "Keep ROM small and controlled."
        }
    ],
    phase2: [
        {
            title: "Low‑Resistance Spin",
            purpose: "Rebuild aerobic base with controlled cadence.",
            safety: "Stay well below moderate effort."
        },
        {
            title: "Band‑Only Strength",
            purpose: "Rebuild hip stability without axial load.",
            safety: "Avoid fatigue; focus on form."
        }
    ],
    phase3: [
        {
            title: "MyWhoosh: Aerobic Endurance",
            purpose: "Return to steady cycling with controlled HR.",
            safety: "Stay in low aerobic range; stop if discomfort increases.",
            primary: true
        },
        {
            title: "Outdoor: Easy Spin",
            purpose: "Reintroduce real‑world pedalling and balance.",
            safety: "Choose flat routes; avoid traffic stress."
        }
    ]
};

/* --- RENDER FUNCTIONS --- */
function renderWorkouts(list) {
    const main = document.getElementById("main");
    main.innerHTML = `<h1>Workouts</h1>`;

    list.forEach(w => {
        main.innerHTML += `
        <div class="card ${w.primary ? 'primary' : ''}">
            <div class="card-header">
                ${badgeIcon}
                <div class="card-title">${w.title}</div>
            </div>
            <p><strong>Purpose:</strong> ${w.purpose}</p>
            <p><strong>Safety:</strong> ${w.safety}</p>
        </div>`;
    });

    main.innerHTML += `
        <div class="disclaimer">
            This app provides general training structure only.  
            It does not provide personalised medical or rehabilitation advice.  
            Always follow guidance from your clinical team.
        </div>`;
}

/* --- SIDEBAR ACTIONS --- */
function loadPhase(n) {
    if (n === 1) renderWorkouts(workouts.phase1);
    if (n === 2) renderWorkouts(workouts.phase2);
    if (n === 3) renderWorkouts(workouts.phase3);
}

function loadToday() {
    // Simple logic: Phase 3 primary workout
    renderWorkouts([workouts.phase3[0]]);
}

function loadAll() {
    renderWorkouts([
        ...workouts.phase1,
        ...workouts.phase2,
        ...workouts.phase3
    ]);
}
</script>

</body>
</html>
