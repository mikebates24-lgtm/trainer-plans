        <!-- Sidebar content will be added in Chunk H2 -->
        <nav class="sidebar-nav">

        </nav>

    <!-- Main content area -->
    <main class="main">
        <!-- content added in later chunks -->

<!-- ============================
     SIDEBAR NAVIGATION
     ============================ -->

<div class="sidebar-section">
    <h3 class="sidebar-heading">Training Phases</h3>
    <ul class="sidebar-list">
        <li><button class="nav-item" data-phase="1">Phase 1 — Protection</button></li>
        <li><button class="nav-item" data-phase="2">Phase 2 — Rebuild</button></li>
        <li><button class="nav-item" data-phase="3">Phase 3 — Return to Cycling</button></li>

</div>

<div class="sidebar-section">
    <h3 class="sidebar-heading">Tools</h3>
    <ul class="sidebar-list">
        <li><button class="nav-item" data-tool="today">Today’s Recommendation</button></li>
        <li><button class="nav-item" data-tool="workouts">All Workouts</button></li>
    </ul>
</div>
<!-- ============================
     SETUP PANEL (COLLAPSIBLE)
     ============================ -->

<section class="setup">

    <!-- Toggle button -->
    <button class="panel-toggle" data-target="setup-panel">
        <span>Setup & Preferences</span>
        <span class="chevron">▸</span>
    </button>

    <!-- Collapsible content -->
    <div id="setup-panel" class="panel-content" hidden>

        <div class="setup-grid">

            <!-- Age -->
            <div class="setup-field">
                <label for="age">Age</label>
                <select id="age">
                    <option value="40-49">40–49</option>
                    <option value="50-59">50–59</option>
                    <option value="60-69">60–69</option>
                    <option value="70-79">70–79</option>
                </select>
            </div>

            <!-- Experience -->
            <div class="setup-field">
                <label for="experience">Cycling Experience</label>
                <select id="experience">
                    <option value="beginner">Beginner</option>
                    <option value="intermediate">Intermediate</option>
                    <option value="advanced">Advanced</option>
                </select>
            </div>

            <!-- Pain level -->
            <div class="setup-field">
                <label for="pain">Pain Level</label>
                <select id="pain">
                    <option value="none">None</option>
                    <option value="mild">Mild</option>
                    <option value="moderate">Moderate</option>
                    <option value="high">High</option>
                </select>
            </div>

            <!-- Weeks since hip replacement -->
            <div class="setup-field">
                <label for="weeks">Weeks Since Hip Replacement</label>
                <select id="weeks">
                    <option value="0-3">0–3 weeks</option>
                    <option value="4-6">4–6 weeks</option>
                    <option value="7-12">7–12 weeks</option>
                    <option value="13+">13+ weeks</option>
                </select>
            </div>

            <!-- Equipment -->
            <div class="setup-field">
                <label>Equipment Available</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" id="eq-indoor"> Indoor trainer</label>
                    <label><input type="checkbox" id="eq-outdoor"> Outdoor bike</label>
                    <label><input type="checkbox" id="eq-bands"> Resistance bands</label>
                </div>
            </div>

            <!-- Yesterday's workout -->
            <div class="setup-field">
                <label for="yesterday">Yesterday’s Workout</label>
                <select id="yesterday">
                    <option value="auto">Auto‑detected (if available)</option>
                    <option value="none">No structured session</option>
                    <option value="easy">Easy ride</option>
                    <option value="moderate">Moderate ride</option>
                    <option value="hard">Hard ride</option>
                </select>
            </div>

        </div>

        <!-- Actions -->
        <div class="setup-actions">
            <button id="apply-settings">Apply Settings</button>
        </div>

        <!-- Summary -->
        <p class="setup-summary" id="setup-summary">
            <!-- JS will populate this -->
        </p>

    </div>

</section>
<!-- ============================
     WEEKLY STRIP (SCROLLABLE)
     ============================ -->

<section class="weekly">

    <button class="panel-toggle" data-target="weekly-panel">
        <span>Weekly Overview</span>
        <span class="chevron">▸</span>
    </button>

    <div id="weekly-panel" class="panel-content" hidden>

        <!-- Scroll container -->
        <div class="weekly-strip" id="weekly-strip">

            <!-- 7 days — JS will populate content -->
            <div class="day-cell" data-day="mon">
                <div class="day-name">Mon</div>
                <div class="day-content"></div>
            </div>

            <div class="day-cell" data-day="tue">
                <div class="day-name">Tue</div>
                <div class="day-content"></div>
            </div>

            <div class="day-cell" data-day="wed">
                <div class="day-name">Wed</div>
                <div class="day-content"></div>
            </div>

            <div class="day-cell" data-day="thu">
                <div class="day-name">Thu</div>
                <div class="day-content"></div>
            </div>

            <div class="day-cell" data-day="fri">
                <div class="day-name">Fri</div>
                <div class="day-content"></div>
            </div>

            <div class="day-cell" data-day="sat">
                <div class="day-name">Sat</div>
                <div class="day-content"></div>
            </div>

            <div class="day-cell" data-day="sun">
                <div class="day-name">Sun</div>
                <div class="day-content"></div>
            </div>

        </div>

    </div>

</section>
